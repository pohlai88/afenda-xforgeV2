<html>
  <body>
    <h2>You've been invited to Afenda</h2>
    <p>You've been invited to create an account for {{ .Email }}.</p>
    <p>
      <a href="{{ .RedirectTo }}&amp;token_hash={{ .TokenHash }}&amp;type=invite"
        >Accept invitation</a
      >
    </p>
    <p>Your invitation code: <strong>{{ .Token }}</strong></p>
    <p>This link and code expire in about an hour and can only be used once.</p>
  </body>
</html>
