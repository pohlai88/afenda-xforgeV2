# Supabase CLI — auth config as code for afenda-Xforge.
# Remote snapshot: `pnpm supabase:auth-config:json > supabase/auth.remote.snapshot.json`
# Hosted-only fields (IP forwarding, HIBP, sessions): `supabase/auth.hosted.toml` + `pnpm supabase:apply-*`
# CLI push (supported keys): `pnpm exec supabase config push`

[auth]
enabled = true
site_url = "https://www.nexuscanon.com"
additional_redirect_urls = [
  "https://www.nexuscanon.com",
  "http://localhost:3000",
  "http://localhost:3000/**",
  "http://localhost:3000/api/auth/callback",
  "http://localhost:3000/auth/confirm",
  "http://localhost:3000/update-password",
]
# General auth — sync to hosted project: pnpm supabase:apply-general-auth-config
enable_signup = true
enable_manual_linking = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.sessions]
timebox = "0s"
inactivity_timeout = "24h"

[auth.email]
enable_signup = true
enable_confirmations = true
secure_password_change = true
max_frequency = "30s"
otp_length = 6
otp_expiry = 3600

[auth.email.smtp]
enabled = true
host = "smtp.zoho.com"
port = 465
user = "env(SUPABASE_SMTP_USER)"
pass = "env(SUPABASE_SMTP_PASSWORD)"
admin_email = "no-reply@nexuscanon.com"
sender_name = "afenda-Xforge"

[auth.rate_limit]
email_sent = 500
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 60
token_verifications = 60
web3 = 30

# Email HTML bodies live in supabase/templates/*.html — push with pnpm supabase:apply-email-templates

[auth.email.template.magic_link]
subject = "Sign in to Afenda"

[auth.email.template.confirmation]
subject = "Confirm your Afenda account"

[auth.email.template.recovery]
subject = "Reset your Afenda password"

[auth.email.template.invite]
subject = "You're invited to Afenda"

[auth.email.template.reauthentication]
subject = "Your Afenda verification code: {{ .Token }}"

[auth.email.template.email_change]
subject = "Confirm your new email address"

[auth.email.notification.password_changed]
enabled = true
subject = "Afenda security notice: password changed"

[auth.email.notification.email_changed]
enabled = true
subject = "Afenda security notice: email address changed"

[auth.email.notification.phone_changed]
enabled = true
subject = "Afenda security notice: phone number changed"

[auth.email.notification.identity_linked]
enabled = true
subject = "Afenda security notice: sign-in method linked"

[auth.email.notification.identity_unlinked]
enabled = true
subject = "Afenda security notice: sign-in method removed"

[auth.email.notification.mfa_factor_enrolled]
enabled = true
subject = "Afenda security notice: verification method added"

[auth.email.notification.mfa_factor_unenrolled]
enabled = true
subject = "Afenda security notice: verification method removed"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[auth.external.anonymous_users]
enabled = false

[auth.passkey]
enabled = true

[auth.webauthn]
rp_display_name = "afenda-xforge"
rp_id = "nexuscanon.com"
rp_origins = [
  "https://www.nexuscanon.com",
  "https://nexuscanon.com",
]

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/hook_custom_access_token"
