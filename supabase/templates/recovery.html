<html>
  <body>
    <h2>Reset your Afenda password</h2>
    <p>We received a request to reset the password for {{ .Email }}.</p>
    <p>
      <a href="{{ .RedirectTo }}&amp;token_hash={{ .TokenHash }}&amp;type=recovery"
        >Reset password</a
      >
    </p>
    <p>Your reset code: <strong>{{ .Token }}</strong></p>
    <p>This link and code expire in about an hour and can only be used once.</p>
    <p>If you did not request a reset, you can safely ignore this email.</p>
  </body>
</html>
