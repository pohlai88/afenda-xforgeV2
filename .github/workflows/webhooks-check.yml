name: Webhooks check

on:
  pull_request:
    paths:
      - "packages/webhooks/**"
      - "packages/database/**"
      - "apps/api/app/cron/webhooks-*/**"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "packages/webhooks/**"
      - "packages/database/**"
      - "apps/api/app/cron/webhooks-*/**"
      - "pnpm-lock.yaml"

concurrency:
  group: webhooks-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @repo/webhooks typecheck

      - name: Unit tests
        run: pnpm --filter @repo/webhooks test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      SKIP_ENV_VALIDATION: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm --filter @repo/webhooks test:integration
