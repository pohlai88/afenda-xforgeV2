name: Monorepo check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: monorepo-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Affected typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      SKIP_ENV_VALIDATION: "true"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch main for affected filter
        run: git fetch origin main:main

      - name: Parallel typecheck and unit tests (affected)
        run: pnpm check:ci

      - name: Boundaries
        run: pnpm boundaries

  integration:
    name: Affected integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'integration'))
    env:
      CI: "true"
      SKIP_ENV_VALIDATION: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch main for affected filter
        run: git fetch origin main:main

      - name: Integration tests (affected)
        run: pnpm test:integration:affected
