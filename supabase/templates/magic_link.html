<html>
  <body>
    <h2>Sign in to Afenda</h2>
    <p>Use the link below or enter the one-time code on the sign-in page.</p>
    <p>
      <a href="{{ .RedirectTo }}&amp;token_hash={{ .TokenHash }}&amp;type=email"
        >Sign in</a
      >
    </p>
    <p>Your one-time code: <strong>{{ .Token }}</strong></p>
    <p>This link and code expire in about an hour and can only be used once.</p>
    <p>If you did not request this, you can safely ignore this email.</p>
  </body>
</html>
