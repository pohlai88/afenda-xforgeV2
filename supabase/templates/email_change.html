<html>
  <body>
    <h2>Confirm your new email address</h2>
    <p>
      Follow the link below to confirm
      <strong>{{ .NewEmail }}</strong> as the new email for your account.
    </p>
    <p>
      <a
        href="{{ .RedirectTo }}&amp;token_hash={{ .TokenHash }}&amp;type=email_change"
        >Confirm new email address</a
      >
    </p>
    <p>Your confirmation code: <strong>{{ .Token }}</strong></p>
    <p>If you did not request this change, you can safely ignore this email.</p>
  </body>
</html>
